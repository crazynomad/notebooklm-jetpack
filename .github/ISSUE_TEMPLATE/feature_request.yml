name: ✨ Feature Request
description: 提出新功能建议 / Suggest a new feature
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的建议！在提交之前，请先搜索是否已有类似的 issue。
        Thanks for your suggestion! Please search existing issues before submitting.

  - type: dropdown
    id: category
    attributes:
      label: 功能类别 / Category
      options:
        - 新导入源 / New Import Source
        - 现有功能增强 / Enhance Existing Feature
        - UI/UX 改进
        - 导出 / Export
        - 其他 / Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 问题或动机 / Problem or Motivation
      description: "你想解决什么问题？为什么需要这个功能？"
      placeholder: "我经常需要从 XX 导入内容到 NotebookLM，但目前没有这个功能..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 建议方案 / Proposed Solution
      description: "你理想中这个功能是怎么工作的？"
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案 / Alternatives Considered
      description: "你目前是怎么绕过这个问题的？有考虑过其他方案吗？"
    validations:
      required: false

  - type: dropdown
    id: willingness
    attributes:
      label: 愿意贡献代码吗？/ Willing to contribute?
      options:
        - 是的，我可以提交 PR / Yes, I can submit a PR
        - 需要指导 / I'd need guidance
        - 不太方便 / Not at this time
    validations:
      required: false
